{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Remote User Login</title>
    <link rel="icon" href="images/icon.png" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-6 relative">

    <!-- Background Pattern/Image Override if desired, but utilizing Tailwind's modern aesthetic -->
    <div class="absolute inset-0 bg-brand-900 overflow-hidden z-0">
        <div class="absolute inset-0 bg-[url('{% static 'bg.jpg' %}')] bg-cover bg-center opacity-30 mix-blend-overlay"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
    </div>

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row z-10">
        
        <!-- Left Side: Information -->
        <div class="w-full md:w-1/2 p-10 bg-brand-50 flex flex-col justify-center">
            <h2 class="text-3xl font-extrabold text-brand-900 tracking-tight leading-tight mb-4 text-center md:text-left">
                Adaptive Hierarchical Cyber Attack Detection
            </h2>
            <div class="h-1 w-20 bg-brand-500 rounded mb-6 mx-auto md:mx-0"></div>
            <p class="text-brand-700 font-medium text-lg leading-relaxed mb-6 text-center md:text-left">
                Cyber attack localization, adaptive, hierarchical, online, and distribution networks.
            </p>
            <div class="hidden md:block mt-8 flex-grow">
                <img src="{% static '/login.png' %}" alt="Security Illustration" class="w-full h-full object-cover rounded-xl shadow-md border border-brand-100 mix-blend-multiply opacity-90">
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-10 flex flex-col justify-center bg-white">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">Remote User Login</h3>
            
            <form role="form" method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="sr-only">User Name</label>
                    <input id="username" type="text" name="username" placeholder="User Name" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors shadow-sm">
                </div>
                
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" type="password" name="password" placeholder="Password" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors shadow-sm">
                </div>
                
                <div class="pt-2">
                    <input type="submit" name="submit1" value="Sign In" 
                        class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded-lg cursor-pointer transition-colors shadow-md duration-200">
                </div>
            </form>

            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500 text-xs uppercase font-medium">Or</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-3">
                    <a href="{% url 'serviceproviderlogin' %}" 
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-brand-700 bg-brand-100 hover:bg-brand-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors text-center">
                        Service Provider
                    </a>
                    <a href="{% url 'Register1' %}" 
                        class="w-full flex justify-center py-2 px-4 border border-brand-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors text-center">
                        Register
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
