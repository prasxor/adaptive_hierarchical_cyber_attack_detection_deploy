{% extends 'SProvider/Header.html' %}
{% block researchblock %}
<div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8 flex justify-center items-center min-h-[60vh]">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 w-full">
        <div class="bg-indigo-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white text-center">Trained Datasets</h2>
            <p class="text-indigo-100 text-center mt-2">Download or process the latest trained cyber attack datasets.</p>
        </div>
        
        <div class="p-8">
            <form role="form" method="POST" class="flex flex-col items-center">
                {% csrf_token %}
                <div class="mb-8 p-6 bg-gray-50 rounded-xl border border-gray-200 text-center w-full max-w-md">
                    <svg class="mx-auto h-12 w-12 text-indigo-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <h3 class="text-lg font-medium text-gray-900 mb-2">Ready for Download</h3>
                    <p class="text-sm text-gray-500">The current datasets have been trained and are ready for extraction.</p>
                </div>
                
                <button type="submit" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                    Process Datasets
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
