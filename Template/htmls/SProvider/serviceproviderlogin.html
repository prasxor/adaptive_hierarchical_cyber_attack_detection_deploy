{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Service Provider Login</title>
    <link rel="icon" href="images/icon.png" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-6 relative">

    <!-- Background Pattern/Image Override if desired, utilizing Tailwind's modern aesthetic -->
    <div class="absolute inset-0 bg-gray-900 overflow-hidden z-0">
        <div class="absolute inset-0 bg-[url('{% static 'bg.jpg' %}')] bg-cover bg-center opacity-30 mix-blend-overlay"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
    </div>

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row-reverse z-10">
        
        <!-- Left Side (Visual info) -->
        <div class="w-full md:w-1/2 p-10 bg-indigo-50 flex flex-col justify-center border-l border-indigo-100">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-brand-100 text-brand-600 mb-6 mx-auto md:mx-0 shadow-sm">
               <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h2 class="text-3xl font-extrabold text-brand-900 tracking-tight leading-tight mb-4 text-center md:text-left">
                Adaptive Hierarchical Cyber Attack Detection
            </h2>
            <div class="h-1 w-20 bg-brand-500 rounded mb-6 mx-auto md:mx-0"></div>
            <p class="text-brand-700 font-medium text-lg leading-relaxed mb-6 text-center md:text-left">
                Secure portal for Service Providers managing cyber attack localization and online distribution networks.
            </p>
            <div class="hidden md:block mt-2">
                <img src="{% static '/AdminLogin.png' %}" alt="Security Illustration" class="w-full h-full object-cover rounded-xl shadow-md border border-brand-200 opacity-90 mix-blend-multiply">
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-10 flex flex-col justify-center bg-white">
            <div class="flex flex-col items-center md:items-start mb-6 w-full">
                <span class="inline-block py-1 px-3 rounded text-xs font-semibold bg-indigo-100 text-indigo-800 tracking-wide uppercase mb-2">Service Provider Portal</span>
                <h3 class="text-2xl font-bold text-gray-800 text-center md:text-left w-full">System Login</h3>
            </div>
            
            <form method="POST" role="form" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="sr-only">User Name</label>
                    <input id="username" type="text" name="username" placeholder="Service Provider Username" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors shadow-sm bg-gray-50 focus:bg-white text-gray-900 placeholder-gray-400">
                </div>
                
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" type="password" name="password" placeholder="Password" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors shadow-sm bg-gray-50 focus:bg-white text-gray-900 placeholder-gray-400">
                </div>
                
                <div class="pt-2">
                    <input type="submit" name="submit1" value="Login" 
                        class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded-lg cursor-pointer transition-colors shadow-md duration-200">
                </div>
            </form>

            <div class="mt-8 flex items-center justify-between border-t border-gray-200 pt-6">
                <span class="text-sm text-gray-500">Not a provider?</span>
                <a href="{% url 'login' %}" 
                    class="text-sm font-semibold text-brand-600 hover:text-brand-500 transition-colors">
                    Remote User Login &rarr;
                </a>
            </div>
        </div>
    </div>
</body>
</html>
