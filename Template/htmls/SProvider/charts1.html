{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<div class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
        
        <div class="bg-indigo-50 px-6 py-5 border-b border-indigo-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h2 class="text-xl font-bold text-indigo-900">Cyber Datasets Trained Accuracy Results</h2>
                <p class="text-sm text-indigo-700 mt-1">Comparing accuracy across testing models.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <a href="{% url 'charts1' 'pie' %}" class="inline-flex items-center px-4 py-2 border border-indigo-300 rounded-md shadow-sm text-sm font-medium text-indigo-700 bg-white hover:bg-indigo-50 transition-colors">
                    Pie Chart
                </a>
                <a href="{% url 'charts1' 'line' %}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    Line Chart
                </a>
            </div>
        </div>

        <div class="p-4 sm:p-8 bg-gray-50" style="min-height: 500px;">
            <div class="bg-white rounded-lg p-4 shadow-inner border border-gray-200">
                <div id="chartContainer" style="height: 400px; width: 100%;"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
<script>
window.onload = function() {
    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        theme: "light2",
        title: {
            text: "{% if chart_type == 'pie' %}Model Accuracy (Pie){% else %}Model Accuracy (Line){% endif %}",
            fontFamily: "Inter, sans-serif",
            fontSize: 20
        },
        data: [{
        {% if chart_type == "line" %}
            type: "line",
            lineColor: "#10b981",
        {% elif chart_type == "pie" %}
            type: "pie",
        {% elif chart_type == "spline" %}
            type: "spline",
        {% endif %}
            startAngle: 240,
            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label} {y}",
            dataPoints: [
            {% for o in form %}
                {y: {{o.dcount}}, label: "{{o.names}}"},
            {% endfor %}
            ]
        }]
    });
    chart.render();
}
</script>

{% endblock %}
